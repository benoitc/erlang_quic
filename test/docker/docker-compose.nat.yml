# Docker Compose for NAT Traversal Testing
# Uses miniupnpd gateway for UPnP/NAT-PMP port mapping
# Usage: docker-compose -f docker-compose.nat.yml up -d

services:
  # NAT Gateway with miniupnpd (UPnP/NAT-PMP support)
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    hostname: gateway
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      external:
        ipv4_address: 172.24.0.2
      internal:
        ipv4_address: 172.25.0.2

  # Internal node - behind NAT, uses UPnP/NAT-PMP for port mapping
  internal_node:
    build:
      context: ../..
      dockerfile: test/docker/Dockerfile.node
    hostname: internal_node
    cap_add:
      - NET_ADMIN
    environment:
      - NODE_NAME=internal@internal_node
      - QUIC_DIST_PORT=4433
      - NAT_ENABLED=true
      - DEFAULT_GATEWAY=172.25.0.2
    extra_hosts:
      - "external_node1:172.24.0.2"
      - "external_node2:172.24.0.2"
    volumes:
      - ./certs:/certs:ro
    networks:
      internal:
        ipv4_address: 172.25.0.10
    depends_on:
      - gateway

  # External node 1 - direct network access
  external_node1:
    build:
      context: ../..
      dockerfile: test/docker/Dockerfile.node
    hostname: external_node1
    environment:
      - NODE_NAME=external1@external_node1
      - QUIC_DIST_PORT=4433
    extra_hosts:
      - "internal_node:172.24.0.2"
    volumes:
      - ./certs:/certs:ro
    networks:
      external:
        ipv4_address: 172.24.0.11
    ports:
      - "44533:4433/udp"

  # External node 2 - direct network access
  external_node2:
    build:
      context: ../..
      dockerfile: test/docker/Dockerfile.node
    hostname: external_node2
    environment:
      - NODE_NAME=external2@external_node2
      - QUIC_DIST_PORT=4433
    extra_hosts:
      - "internal_node:172.24.0.2"
    volumes:
      - ./certs:/certs:ro
    networks:
      external:
        ipv4_address: 172.24.0.12
    ports:
      - "44534:4433/udp"

  # Test runner for NAT tests
  nat_test_runner:
    build:
      context: ../..
      dockerfile: test/docker/Dockerfile.node
    hostname: nat_test_runner
    environment:
      - TEST_INTERNAL_NODE=internal@internal_node
      - TEST_EXTERNAL_NODES=external1@external_node1,external2@external_node2
    extra_hosts:
      - "internal_node:172.24.0.2"
    volumes:
      - ./certs:/certs:ro
      - ./scripts:/scripts:ro
    networks:
      external:
        ipv4_address: 172.24.0.20
    depends_on:
      - gateway
      - internal_node
      - external_node1
      - external_node2
    entrypoint: ["/scripts/run_nat_test.sh"]

networks:
  # External network (simulates internet)
  external:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/24
          gateway: 172.24.0.1

  # Internal network (behind NAT)
  internal:
    driver: bridge
    internal: true
    enable_ipv6: false
    ipam:
      config:
        - subnet: 172.25.0.0/24
