# MiniUPnPd configuration for NAT testing
# Supports: UPnP IGD, NAT-PMP, PCP

# External interface (WAN) - will be updated by entrypoint
ext_ifname=eth0

# Fake public IP for clients (TEST-NET-3, RFC 5737)
ext_ip=203.0.113.42

# Allow private/reserved IP on external interface (for Docker testing)
ext_allow_private_ipv4=yes

# Internal interface (LAN) - will be updated by entrypoint
listening_ip=eth1

# HTTP port for UPnP SOAP
http_port=5000

# Enable NAT-PMP (includes PCP support)
enable_natpmp=yes

# PCP lifetime settings
min_lifetime=120
max_lifetime=86400

# Enable UPnP
enable_upnp=yes

# Friendly name
friendly_name=Docker NAT Gateway

# Manufacturer info
manufacturer_name=erlang-nat test
manufacturer_url=https://github.com/benoitc/erlang-nat
model_name=MiniUPnPd Test Gateway
model_number=1

# Secure mode - check that client IP matches
# Disabled for Docker testing (client IP differs from internal IP)
secure_mode=no

# System uptime instead of daemon uptime
system_uptime=yes

# Lease file for persistent mappings
lease_file=/var/log/miniupnpd.leases

# Notify interval for SSDP (seconds)
notify_interval=60

# Clean rules interval (seconds)
clean_ruleset_interval=600

# Allow rules - permit port mappings from these networks
# Format: allow port_range internal_ip/mask port_range
allow 1024-65535 0.0.0.0/0 1024-65535
